<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Simulador Financiero IA</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&display=swap" rel="stylesheet">

</head>

<body>

<h1>Simulador de Ahorro Inteligente</h1>

<div class="container">

<label>Ingreso mensual</label>
<input type="number" id="ingreso">

<label>Gastos mensuales</label>
<input type="number" id="gastos">

<label>Meta de ahorro ($)</label>
<input type="number" id="meta">

<label>Meses para lograrlo</label>
<input type="number" id="meses">

<label>¿Para qué quieres ahorrar?</label>
<select id="sueno">
<option value="viaje">Viaje</option>
<option value="casa">Casa</option>
<option value="carro">Carro</option>
<option value="estudio">Estudio</option>
<option value="tecnologia">Tecnología</option>
</select>

<button onclick="calcular()">Calcular Plan</button>

<h2 id="resultado"></h2>

<img id="imagenMeta" src="" width="250">

</div>

<script src="script.js"></script>

</body>
</html>
